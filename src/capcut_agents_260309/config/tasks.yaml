emotion_detection_task:
  description: >
    제공된 STT JSON 데이터([{stt_data}])에서 사용자가 선택한 화자({selected_speaker})의 '짧은 리액션'만 전수 조사하세요.
    
    [필터링 규칙: 무엇을 버릴 것인가?]
    - 두 문장 이상의 긴 대화나 설명은 무조건 제외하세요.
    - 단순히 정보를 전달하거나 일반적인 잡담 구간도 제외하세요.
    
    [핵심 추출 대상: 무엇을 남길 것인가?]
    - 3초 이내로 끝나는 짧고 punchy한 리액션 (예: "와!", "대박", "아 진짜?", "헐!")
    - 깨달음을 얻었을 때의 짧은 추임새 (예: "아!", "오호!", "그렇구나!")
    - 감동이나 기쁨이 터지는 짧은 순간만 남기고 나머지는 모두 버리세요.
  expected_output: >
    일반 대화가 제거되고 '짧은 리액션 소스'만 남은 타임스탬프 리스트.
  agent: emotion_scout

capcut_export_task:
  description: >
    'emotion_detection_task'에서 찾은 모든 감탄사/리액션 구간을 캡컷용 JSON으로 변환하세요.
    
     [중요: 타임라인 시간 계산 규칙]                                                         
    - 캡컷 타임라인은 0초부터 시작합니다. 각 클립은 이전 클립이 끝난 직후에 이어져야 합니다.                                                                                     
    - 1번째 클립: 타임라인 0초 ~ (길이)초                                                  
    - 2번째 클립: 타임라인 (1번째 종료)초 ~ (1번째 종료 + 길이)초                          
    - 자막(texts)의 'start_time'과 'end_time'은 반드시 해당 클립이 놓인 **타임라인 시간**과 일치해야 합니다. (원본 영상 시간이 아닙니다!)  

    [경고: 가짜 파일명 사용 금지]
    - 'video_source.mp4', 'cam1.mp4' 같은 이름은 절대 사용하지 마세요.
    - 반드시 너에게 입력된 실제 절대 경로 리스트({abs_video_paths})에 있는 경로를 '토씨 하나 틀리지 말고' 그대로 사용하세요.
    - 현재 작업 대상 파일은 다음과 같습니다: {abs_video_paths}
    
    [중요: 타임라인 시간 계산]
    - 1번째 클립: 타임라인 0초부터 시작.
    - 이후 클립: 이전 클립이 끝난 지점에 0.1초 간격을 두고 순차적으로 배치.
    - 자막(texts) 시간도 비디오 클립의 타임라인 시간과 100% 일치시키세요.

    [핵심 자막 규칙]                                                           
    - 각 클립 위에 "[화자 이름] 리액션 내용" 자막을 정확히 겹쳐서 배치하세요.
    
    변환된 데이터를 'CapCut_Editor' 도구의 details 파라미터로 전송하세요.
  expected_output: >
     각 영상 클립 위에 화자 정보 자막이 정확히 일치하여 배치되어 있고, 실제 파일 경로({abs_video_paths})가 정확히 적용된 캡컷 프로젝트 생성 완료 보고서.
  agent: capcut_engineer
