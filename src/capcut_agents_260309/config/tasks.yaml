sync_task:
  description: >
    작업 폴더({video_folder_path})에 있는 총 {video_count}개의 영상 파일들({video_files})을 분석하세요.
    1번 카메라를 기준으로 나머지 카메라들의 오디오 딜레이를 밀리초(ms) 단위로 정확히 도출하세요.
    반드시 'Video_Sync_Tool' 도구에 동기화할 파일들의 절대 경로 리스트를 입력하여 실행하세요.
  expected_output: >
    각 카메라의 파일명과 동기화를 위한 오프셋(ms)이 기록된 JSON 형식의 데이터.
  agent: sync_engineer

analysis_task:
  description: >
    사전에 추출된 기준 영상(1번 카메라)의 대본(STT 결과) JSON 데이터를 제공합니다: [{stt_data}]
    이 JSON 데이터를 읽고 문장 단위로 화자의 감정(예: 흥분, 웃음, 진지함)과 중요도(1~10점)를 태깅하세요.
    제공된 원문의 타임스탬프(절대 시간)를 절대로 변경하거나 누락하지 마세요.
  expected_output: >
    타임스탬프, 텍스트 원문, 감정 태그, 중요도가 포함된 시간순 스크립트 리스트.
  agent: script_analyst

topic_task:
  description: >
    'analysis_task'의 스크립트 분석 결과를 바탕으로, 이 영상으로 만들 수 있는 흥미로운 유튜브/숏폼 편집 기획 주제(테마) 3가지를 제안하세요.
    각 주제별로 [가제(제목)], [주요 시청 타겟], [간략한 편집 방향]을 포함하세요.
    제안 후에는 사용자의 피드백을 기다립니다. 사용자가 가장 마음에 드는 주제를 선택하거나 새로운 방향을 제시하면, 그 피드백을 반영하여 최종 확정된 1개의 주제를 반환하세요.
  expected_output: >
    사용자 피드백을 거쳐 최종 확정된 1개의 편집 기획 주제 및 방향성.
  agent: story_director
  human_input: true

story_task:
  description: >
    이전 단계에서 확정된 '최종 편집 기획 주제(topic_task 결과)'와 '시간순 스크립트(analysis_task 결과)' 전체를 정독하고 분석하세요.
    스크립트가 매우 길 경우, 핵심 사건과 감정 변화가 큰 구간(웃음, 흥분 등)을 위주로 전체 흐름을 파악하세요.
    확정된 주제에 맞추어 다음을 수행하여 구조화된 스토리보드를 작성하세요:
    1. [메인 테마 및 기획 의도]: 영상을 관통하는 한 줄 정의.
    2. [기승전결 타임라인]: 각 단계(도입부, 전개, 절정, 마무리)의 대략적인 시작/종료 타임스탬프와 해당 구간의 요약 내용.
    3. [최고의 1분(클라이맥스)]: 시청률이 가장 높을 것으로 예상되는 정확한 타임스탬프 구간과 그 이유.
    4. [편집 호흡(Pacing) 가이드]: 감정이 고조되는 구간은 '빠른 템포', 설명 구간은 '여유로운 템포' 등 전반적인 편집 리듬 제안.
    5. [시퀀스 재구성 가이드]: 모든 문장에 '중요도(1~10점)'를 매기고, 전체 영상 분량의 40%는 버린다고 생각하라. 중요도 7점 이하의 설명조 문장은 과감히 삭제하고, 핵심 메시지와 감정이 터지는 문장 위주로 시퀀스를 재구성하라. 확정된 '메인 테마'와 관련이 없는 다른 주제(잡담, 다른 에피소드 등)의 구간은 중요도가 높거나 재미있더라도 무조건 전체 삭제하여 일관된 맥락을 유지하라.
    사용자의 특별 연출 지시사항 또한 반영: [{user_prompt}]
  expected_output: >
    위 4가지 항목이 명확한 마크다운 헤더로 구분된 [스토리보드 및 연출 기획서].
  agent: story_director

visual_task:
  description: >
    작업 폴더({video_folder_path})에 있는 영상 파일들({video_files}) 중 분석할 대상의 절대 경로를 파악하세요.
    파악한 영상 경로를 반드시 'Video_Vision_Tool' 도구에 입력하여 화면 프레임을 분석하고 다음을 수행하세요:
    1. 샷 종류(풀샷, 바스트샷, 클로즈업) 분류.
    2. 세로형(9:16) 크롭(Crop)을 위한 중심 좌표 가이드 제시.
  expected_output: >
    구도 상태(샷 종류) 및 크롭 가이드가 정리된 시각 분석 리포트.
  agent: visual_director

editing_task:
  description: >
    스크립트 분석 리포트(절대 시간)와 시각 분석 리포트, 그리고 싱크 엔지니어의 '오프셋 데이터'를 종합하여 최종 컷 편집 지시서(EDL)를 작성하세요.
    [중요 보정 규칙]: 
    자막이 표시될 타임라인 절대 시간은 그대로 유지하되, 화면을 다른 카메라 영상으로 전환할 때는 해당 비디오 클립의 In/Out 시간에 반드시 해당 카메라의 오프셋(ms)을 더하거나 빼서 보정해야 합니다. (예: 기준 영상보다 2.5초 일찍 시작된 영상을 사용할 경우, 해당 비디오 클립의 시작 시간에서 2.5초를 빼서 기록)
    [편집 규칙]: 중요도 8~10점은 클로즈업, 일반 설명은 풀/바스트샷. 
    비주얼 디렉터 & PD 협업 로직: 화자가 말을 하는 도중이라도, '리액션 포인트'를 강제로 삽입하라.
    - 웃음보 발생 시: 화자가 웃기 시작한 0.5초 뒤에 바로 리액션 카메라(듣는 사람)로 1초간 전환 후 다시 화자에게 복귀.
    - 긴 문장 지시: 한 화자가 5초 이상 길게 말할 경우, 중간에 반드시 1.5초간 다른 카메라(풀샷이나 상대방 리액션)를 비출 것.
    - PD는 화자가 말을 멈추지 않았더라도, 시각적 지루함을 방지하기 위해 3~5초 주기로 카메라 앵글을 강제로 교체(Cut-away)하라.
    [사용자 지시사항]: {user_prompt}
  expected_output: >
    [절대 시간 시작, 절대 시간 종료, 보정된 비디오 클립 In 시간, 카메라 번호, 사유]가 나열된 최종 컷 편집 리스트(EDL).
  agent: main_pd

motion_task:
  description: >
    EDL을 바탕으로 디자인 요소를 추가하세요.
    1. 자막 2~3어절 줄바꿈.
    2. 핵심 키워드에 강조 색상(#FFD700) 부여.
    3. 감정 고조/컷 전환 시 이펙트(zoom_in, shake 등) 추가.
  expected_output: >
    자막 배열, 색상, 이펙트가 통합된 '마스터 편집 기획서(JSON)'.
  agent: motion_designer

capcut_export_task:
  description: >
    '마스터 편집 기획서'를 바탕으로 반드시 다음 JSON 형식을 만들어 'CapCut_Editor' 도구의 details 파라미터로 전송하세요.
    JSON 필수 형식: {"videos": [{"path": "절대경로", "start_time": 초, "end_time": 초}], "texts": [{"content": "자막내용", "start_time": 초, "end_time": 초}]}
    시간은 초(seconds) 단위의 소수점으로 작성하세요.
  expected_output: >
    캡컷 MCP 서버의 응답 결과 메시지 및 실행 완료 보고서.
  agent: capcut_engineer