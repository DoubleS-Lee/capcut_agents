emotion_detection_task:
  description: >
    제공된 STT JSON 데이터([{stt_data}])에서 사용자가 선택한 화자({selected_speaker})의 리액션 구간을 추출하세요.

    [사용자 요청 - 최우선 기준]
    사용자가 원하는 감정/리액션 유형: {user_prompt}
    이 요청을 최우선으로 반영하여, 해당 감정에 맞는 구간을 골라내세요.

    [공통 필터링 규칙]
    1. 단어 수 제한: 공백 포함 7단어 이하의 발화만 수집하세요.
    2. 내용 제한: 정보 전달, 질문, 긴 설명은 제외하세요. 감탄사와 짧은 감정 표현만 남깁니다.
    3. 시간 제한: 발화 시간이 4초를 넘는 문장은 제외하세요.
  expected_output: >
    사용자 요청에 맞는 짧은 리액션 구간 목록. 각 항목은 화자, start, end, text 포함.
  agent: emotion_scout

capcut_export_task:
  description: >
    'emotion_detection_task'에서 찾은 구간들을 CapCut_Editor 도구를 사용하여 서버로 전송하세요.

    [필수 행동]
    반드시 CapCut_Editor 도구를 호출해야 합니다. 도구를 호출하지 않으면 작업이 완료되지 않습니다.
    - command 값: "create_draft"
    - details 값: 아래 clips 규격의 JSON 문자열

    [clips JSON 규격]
    clips 키 아래에 각 구간을 배열로 나열합니다.
    각 항목은 path(영상 절대경로), start_time(STT시작-0.5), end_time(STT종료+0.5), content([화자] 대사) 필드를 가집니다.
    영상 경로는 다음 목록에서 선택하세요: {abs_video_paths}

    [주의사항]
    - 'videos'나 'texts' 키를 따로 만들지 마세요. 반드시 'clips' 키만 사용하세요.
    - 마크다운 코드블록(```json) 없이 순수 JSON 문자열만 details에 넣으세요.
    - 도구 호출 전에 JSON을 미리 작성하고, 그 JSON을 그대로 details에 넣으세요.
  expected_output: >
    CapCut_Editor 도구 호출 성공 메시지와 생성된 클립 목록 요약.
  agent: capcut_engineer
